        # Level Enchantment blacklist will be treated as a Whitelist
        B:"Level Enchantment Whitelist Toggle"=false

        # Librarians will not be able to generate enchantments in this list
        S:"Librarian Enchantment Blacklist" <
            somanyenchantments:ancientswordmastery
            somanyenchantments:ancientsealedcurses
            somanyenchantments:pandorascurse
            somanyenchantments:supremeprotection
            aquaculture:appealing
            aquaculture:barbed_hook
            aquaculture:double_hook
            aquaculture:heavy_line
            aquaculture:long_cast
            aquaculture:magnetic
            aquaculture:short_cast
            mujmajnkraftsbettersurvival:vitality
         >

