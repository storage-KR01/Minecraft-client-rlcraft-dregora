    #--------------------------------------------------------------------------------------------------------#
    # Miscellaneous
    ##########################################################################################################

    miscellaneous {
        # If Advanced Mending should prioritize repairing damaged items
        B:"Advanced Mending Prioritize Damaged Items"=false

        # Allow enchantments to change the weather
        B:"Allow Weather Changing Effects"=true

        # Whether or not Atomic Deconstructor should work on bosses (May cause bugs)
        B:"Atomic Deconstructor Works on Bosses"=false

        # Overwrites outdated BetterSurvival handling meant for older versions of SME
        # If BetterSurvival updates or you are not using BetterSurvival, disable this option
        B:"BetterSurvival Forced Compatibility"=true

        # If set to true, Curse of Possession will delete cursed items dropped from inventory on death when no player can be found
        B:"Curse Of Possession Death Deletion"=true

        # If curses should be allowed to apply to books
        B:"Curses Apply To Books"=false

        # Ignores registering enabled enchantments so they do not show up in game
        B:"Don't Register Disabled Enchants"=true

