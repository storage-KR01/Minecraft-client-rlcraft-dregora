        B:"Librarian Enchantment Whitelist Toggle"=false

        # Tick interval that Pandora's Curse will check a players inventory
        # Min: 200
        # Max: 2147483647
        I:"Pandora's Curse Interval"=600

        # List of potion effects blacklisted from being applied by enchantments, in the format modname:potionid
