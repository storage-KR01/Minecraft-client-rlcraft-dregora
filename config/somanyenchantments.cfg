    ##########################################################################################################
    # can apply on enchantment table and anvil
    #--------------------------------------------------------------------------------------------------------#
    # Types of items each enchantment can apply on at enchantment table and anvil. 
    # This is using the vanilla EnumEnchantmentType system where an item is checked against various conditions to decide whether it can get an enchant.
    # For example to get SWORD enchants an item needs to inherit the vanilla ItemSword class. This means modded swords can also fit to SWORD, if their classes do inherit ItemSword.
    # Available types: ALL_TYPES (=any of the following types), ARMOR, ARMOR_HEAD, ARMOR_CHEST, ARMOR_LEGS, ARMOR_FEET, SWORD, TOOL, FISHING_ROD, BREAKABLE, BOW, WEARABLE, ALL_ITEMS (=any Item), AXE, PICKAXE, HOE, SHOVEL, SHIELD, NONE
    # To remove a subset of an item type (like all gold swords) from an enchant, use ! in front of a (custom) type.
    # Blacklisting like this will always be stronger than whitelisting, so an item that fits a listed type but also fits a listed type with ! will not be able to get the enchant.
    ##########################################################################################################

    "can apply on enchantment table and anvil" {
        # Some modded items only pretend to be a specific item type without actually being them (wolf armor being SWORD and ARMOR_FEET, better survival items being SWORD etc).
        # Enabling this toggle will make the given item type match those too.
        # Disabling will instead only look at the actual checks of each EnumEnchantmentType (like SWORD = has to be instanceof ItemSword) to match.
        B:"-Allow Custom Items"=true

        # Pattern: 
        #     Name to use; Regex to match against item ids
        # Custom types can also be used in canApplyAnvil config
        S:"-Custom Item Types" <
            BATTLEAXE; (mujmajnkraftsbettersurvival\:item.*battleaxe)|(spartan(defiled|fire|weaponry)\:battleaxe.*)
            LYCANITES_EQUIPMENT; lycanitesmobs:equipment
            SW_CROSSBOW; spartan(defiled|fire|weaponry)\:crossbow.*
         >
        S:Adept <
            SWORD
            AXE
            BOW
            BATTLEAXE
            SW_CROSSBOW
         >
        S:"Advanced Bane of Arthropods" <
            SWORD
         >
        S:"Advanced Blast Protection" <
            ARMOR
         >
        S:"Advanced Efficiency" <
            TOOL
