    ##########################################################################################################

    "srparasites options" {
        # Parasite drops in the overworld have a chance to instead drop as corrupted ashes. This is the chance for that to happen.
        D:"Corrupted Ashes chance"=0.375

        # All Beckons near one beckon will be killed
        B:"Kill Beckon nearby"=false

        # Range in radius blocks searched around the beckon for nearby beckons
        B:"Kill Beckon nearby range"=32

        # All SRParasites outside of the allowed biomes in the allowed biome whitelist will automatically be killed
        B:"Kill Parasites outside alllowed biomes"=true

        # Parasite display names that are allowed to always drop loot (even outside allowed biomes).
        # This matches the entity's *custom display name*, not its ID.
        # It's enough if the custom name contains any of these listed strings for it to be always allowed to drop loot.
        S:"Parasite full loot-drop enabler" <
            Sentient Horror
            Degrading Overseer
            Malformed Observer
            Shivaxi
            Corrupted Carrier
            Necrotic Blight
         >

        # List of biome IDs to whitelist or blacklist depending on biomeListIsWhitelist.
        # This list supports the * wildcard, example: biomesoplenty:* would whitelist all biomesoplenty biomes.
        S:"SRParasites allowed biomes" <
